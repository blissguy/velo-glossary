name: Release on version bump

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read plugin version from header
        id: ver
        run: |
          set -euo pipefail

          VERSION="$(grep -iE '^[[:space:]]*\*[[:space:]]*Version:' velo-glossary.php \
            | head -1 \
            | sed -E 's/.*Version:[[:space:]]*//' \
            | tr -d '[:space:]\r')"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [ -z "$VERSION" ]; then
            echo "Could not find a Version header. Aborting."
            exit 1
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+(\.[0-9]+){1,3}([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Version ${VERSION} is not a valid release version."
            exit 1
          fi

          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Plugin header version ${VERSION} does not match package.json version ${PACKAGE_VERSION}."
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${VERSION}"

      - name: Check whether this release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if gh release view "${{ steps.ver.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release ${{ steps.ver.outputs.tag }} already exists. Skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build plugin ZIP
        if: steps.check.outputs.exists == 'false'
        id: build
        run: |
          set -euo pipefail

          PLUGIN_SLUG="velo-glossary"
          VERSION="${{ steps.ver.outputs.version }}"
          BUILD_DIR="build/${PLUGIN_SLUG}"
          ZIP_NAME="${PLUGIN_SLUG}-${VERSION}.zip"

          rm -rf build "$ZIP_NAME"
          mkdir -p "$BUILD_DIR"

          rsync -a \
            --exclude-from=.distignore \
            --exclude='.git' \
            --exclude='.github' \
            ./ "$BUILD_DIR"/

          ( cd build && zip -rq "../${ZIP_NAME}" "$PLUGIN_SLUG" )

          unzip -l "$ZIP_NAME"
          echo "zip-name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build release notes from changelog
        if: steps.check.outputs.exists == 'false'
        run: |
          set -euo pipefail

          VERSION="${{ steps.ver.outputs.version }}"
          README_URL="https://github.com/${GITHUB_REPOSITORY}/blob/${GITHUB_SHA}/readme.txt"

          {
            echo "Velo Glossary ${VERSION}"
            echo
            awk -v version="$VERSION" '
              BEGIN { in_changelog = 0; in_version = 0; }
              /^==[[:space:]]*Changelog[[:space:]]*==/ { in_changelog = 1; next; }
              in_changelog && /^==[[:space:]]+[^=]+[[:space:]]*==/ { if (in_version) exit; next; }
              in_changelog && $0 ~ "^=[[:space:]]*" version "[[:space:]]*=$" { in_version = 1; next; }
              in_changelog && in_version && /^=[[:space:]]+[^=]+[[:space:]]*=$/ { exit; }
              in_changelog && in_version { print; }
            ' readme.txt | sed '/^[[:space:]]*$/d' > changelog-section.txt

            if [ -s changelog-section.txt ]; then
              cat changelog-section.txt
            else
              echo "Automated release for version ${VERSION}."
              echo
              echo "See the readme.txt changelog: ${README_URL}"
            fi
          } > release-notes.md

          cat release-notes.md

      - name: Create the release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          VERSION="${{ steps.ver.outputs.version }}"
          TAG="${{ steps.ver.outputs.tag }}"
          ZIP_NAME="${{ steps.build.outputs.zip-name }}"

          gh release create "$TAG" \
            "$ZIP_NAME" \
            --target "$GITHUB_SHA" \
            --title "Velo Glossary ${VERSION}" \
            --notes-file release-notes.md
